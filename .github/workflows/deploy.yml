name: CI/CD - Azure Bicep Deployment

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/**'
      - 'parameters.json'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/**'
      - 'parameters.json'

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  RESOURCE_GROUP: my-rg

jobs:
  validate:
    name: Validate Bicep Template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep template
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az bicep install
            az bicep build --file infra/main.bicep
            # Validation via what-if (no changes applied)
            az deployment group what-if \
              --resource-group $RESOURCE_GROUP \
              --template-file infra/main.bicep \
              --parameters @parameters.json

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep to resource group
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -e
            az bicep install
            az bicep build --file infra/main.bicep
            az deployment group create --resource-group my-rg --template-file infra/main.bicep --parameters @parameters.json

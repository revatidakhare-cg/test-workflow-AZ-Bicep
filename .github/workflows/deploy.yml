name: CI/CD - Azure Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AZURE_LOCATION: westeurope
  BICEP_FILE: infra/main.bicep
  RESOURCE_GROUP_NAME: rg-sample-app-main

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Azure CLI
        uses: azure/cli@v2

      - name: Lint and build Bicep
        run: |
          az bicep version
          az bicep build --file "${{ env.BICEP_FILE }}" --outfile /tmp/main.json

      - name: Validate ARM template
        run: |
          # Basic JSON validation of the compiled template
          cat /tmp/main.json | jq '.' > /dev/null

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.RESOURCE_GROUP_NAME }}" \
            --location "${{ env.AZURE_LOCATION }}"

      - name: Build Bicep to ARM
        run: |
          az bicep build \
            --file "${{ env.BICEP_FILE }}" \
            --outfile /tmp/main.json

      - name: Deploy infrastructure (what-if)
        run: |
          az deployment group what-if \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --template-file /tmp/main.json \
            --parameters \
              location="${{ env.AZURE_LOCATION }}"

      - name: Deploy infrastructure (create/update)
        run: |
          az deployment group create \
            --resource-group "${{ env.RESOURCE_GROUP_NAME }}" \
            --template-file /tmp/main.json \
            --parameters \
              location="${{ env.AZURE_LOCATION }}" \
            --mode Incremental
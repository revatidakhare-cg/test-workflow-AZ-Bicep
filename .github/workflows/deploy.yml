name: CI/CD - Azure Bicep

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/**'
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'infra/**'
      - 'src/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
  AZURE_DEPLOYMENT_NAME: github-deploy-${{ github.run_number }}

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC and validate Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Logging in to Azure using federated identity..."
            az login --identity 2>/dev/null || true
            az account show 1>/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "Using OIDC federated credentials..."
              az login --service-principal \
                --tenant ${{ vars.AZURE_TENANT_ID }} \
                --username ${{ vars.AZURE_CLIENT_ID }} \
                --federated-token $ACTIONS_ID_TOKEN_REQUEST_TOKEN \
                --allow-no-subscriptions
            fi

            echo "Setting Azure subscription..."
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"

            echo "Validating Bicep file..."
            az bicep version
            az deployment sub what-if \
              --name "${AZURE_DEPLOYMENT_NAME}-validate" \
              --location "$AZURE_LOCATION" \
              --template-file infra/main.bicep \
              --parameters \
                location="$AZURE_LOCATION" \
                resourceGroupName="$AZURE_RESOURCE_GROUP" \
              --no-pretty-print

  deploy:
    name: Deploy to Azure
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login via OIDC and deploy Bicep
        uses: azure/cli@v2
        with:
          inlineScript: |
            echo "Logging in to Azure using federated identity..."
            az login --identity 2>/dev/null || true
            az account show 1>/dev/null 2>&1
            if [ $? -ne 0 ]; then
              echo "Using OIDC federated credentials..."
              az login --service-principal \
                --tenant ${{ vars.AZURE_TENANT_ID }} \
                --username ${{ vars.AZURE_CLIENT_ID }} \
                --federated-token $ACTIONS_ID_TOKEN_REQUEST_TOKEN \
                --allow-no-subscriptions
            fi

            echo "Setting Azure subscription..."
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"

            echo "Ensuring resource group exists..."
            az group create \
              --name "$AZURE_RESOURCE_GROUP" \
              --location "$AZURE_LOCATION"

            echo "Deploying Bicep template to resource group..."
            az deployment group create \
              --name "$AZURE_DEPLOYMENT_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters \
                location="$AZURE_LOCATION" \
                resourceGroupName="$AZURE_RESOURCE_GROUP" \
              --query "{status:properties.provisioningState,outputs:properties.outputs}" \
              --output json
